spring:
  application:
    name: delivery-platform
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/delivery?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:delivery}
    password: ${DB_PASSWORD:delivery}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  redis:
    host: ${REDIS_HOST:localhost}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:}
  session:
    store-type: redis
    timeout: 8h

server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax

management:
  endpoints:
    web:
      exposure:
        include: health,info

delivery:
  settings:
    encryption-key: ${SETTINGS_ENCRYPTION_KEY:${AGENT_SHARED_SECRET:change-me}}
  outline:
    base-url: ${OUTLINE_BASE_URL:http://localhost:3000}
    public-base-url: ${OUTLINE_PUBLIC_BASE_URL:}
    api-token: ${OUTLINE_API_TOKEN:}
    collection-id: ${OUTLINE_COLLECTION_ID:}
    connect-timeout: ${OUTLINE_CONNECT_TIMEOUT:3s}
    read-timeout: ${OUTLINE_READ_TIMEOUT:10s}
    max-attempts: ${OUTLINE_MAX_ATTEMPTS:5}
    initial-backoff: ${OUTLINE_INITIAL_BACKOFF:30s}
    stale-after: ${OUTLINE_STALE_AFTER:5m}
  agent:
    base-url: ${AGENT_BASE_URL:http://localhost:8090}
    callback-url: ${AGENT_CALLBACK_URL:http://backend:8080/api/v1/integrations/agent/events}
    shared-secret: ${AGENT_SHARED_SECRET:change-me}
    timeout-minutes: ${AGENT_TIMEOUT_MINUTES:30}
  ai:
    base-url: ${AI_BASE_URL:}
    model: ${AI_MODEL:}
    api-key: ${AI_API_KEY:}
  storage:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:${MINIO_ENDPOINT:http://localhost:9000}}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:delivery}
    max-file-size: ${MAX_FILE_SIZE:104857600}
