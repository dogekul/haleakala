name: outline-stack

services:
  postgres:
    image: postgres:18.4-alpine3.24
    restart: unless-stopped
    mem_limit: 384m
    environment:
      POSTGRES_USER: outline
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: outline
      TZ: Asia/Shanghai
    volumes:
      - postgres-data:/var/lib/postgresql
    # The ECS host uses CentOS 7's old libseccomp, which blocks syscalls used by PostgreSQL 18.
    security_opt:
      - seccomp=unconfined
    networks: [private]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U outline -d outline"]
      interval: 10s
      timeout: 5s
      retries: 30

  redis:
    image: redis:7.4.9-alpine3.21
    restart: unless-stopped
    mem_limit: 128m
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      TZ: Asia/Shanghai
    command: ["sh", "-c", "exec redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\""]
    volumes:
      - redis-data:/data
    networks: [private]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 30

  dex:
    image: ghcr.io/dexidp/dex:v2.45.1-alpine
    restart: unless-stopped
    mem_limit: 128m
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    volumes:
      - ./dex/config.yaml:/etc/dex/config.yaml:ro
      - dex-data:/var/dex
    networks: [private]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:5558/healthz/live"]
      interval: 10s
      timeout: 5s
      retries: 30

  outline:
    image: docker.getoutline.com/outlinewiki/outline:1.7.1
    restart: unless-stopped
    mem_limit: 768m
    environment:
      NODE_ENV: production
      URL: https://outline.8.166.121.138.sslip.io
      PORT: 3000
      SECRET_KEY: ${OUTLINE_SECRET_KEY:?OUTLINE_SECRET_KEY is required}
      UTILS_SECRET: ${OUTLINE_UTILS_SECRET:?OUTLINE_UTILS_SECRET is required}
      DATABASE_URL: postgres://outline:${POSTGRES_PASSWORD}@postgres:5432/outline
      PGSSLMODE: disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      FORCE_HTTPS: "true"
      WEB_CONCURRENCY: "1"
      FILE_STORAGE: local
      FILE_STORAGE_LOCAL_ROOT_DIR: /var/lib/outline/data
      FILE_STORAGE_UPLOAD_MAX_SIZE: "26214400"
      OIDC_ISSUER_URL: https://outline.8.166.121.138.sslip.io/dex
      OIDC_CLIENT_ID: outline
      OIDC_CLIENT_SECRET: ${DEX_OIDC_CLIENT_SECRET:?DEX_OIDC_CLIENT_SECRET is required}
      OIDC_DISPLAY_NAME: 智鹿账号
      OIDC_SCOPES: openid profile email
      OIDC_USERNAME_CLAIM: preferred_username
      OIDC_DISABLE_REDIRECT: "true"
      LOG_LEVEL: info
      TZ: Asia/Shanghai
    volumes:
      - outline-data:/var/lib/outline/data
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      dex: { condition: service_healthy }
    networks:
      private:
      zhilu:
        aliases: [outline]
    healthcheck:
      test: ["CMD", "node", "-e", "const r=require('http').get('http://127.0.0.1:3000/',x=>process.exit(x.statusCode<500?0:1));r.on('error',()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 30s

  caddy:
    image: caddy:2.11.4-alpine
    restart: unless-stopped
    mem_limit: 128m
    ports:
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      dex: { condition: service_healthy }
      outline: { condition: service_healthy }
    networks: [private]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:2019/config/"]
      interval: 10s
      timeout: 5s
      retries: 30

networks:
  private:
  zhilu:
    external: true
    name: zhilu-delivery_default

volumes:
  postgres-data:
  redis-data:
  dex-data:
  outline-data:
  caddy-data:
  caddy-config:
